repos:
  - repo: https://github.com/GitGuardian/ggshield
    rev: v1.52.2
    hooks:
      - id: ggshield
  - repo: local
    hooks:
      - id: renovate-ignore-sync
        name: "Sync '# renovate: ignore' annotations into renovate.json"
        entry: python scripts/update-renovate-ignores.py
        language: python
        files: \.(ya?ml|json)$
        pass_filenames: false
