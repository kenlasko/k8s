---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pgadmin
  namespace: cnpg
spec:
  parentRefs:
  - name: tls
    namespace: cilium
    sectionName: https
  hostnames:
  - "pgadmin.laskonet.com"
  rules:
  - backendRefs:
    - name: pgadmin-pgadmin4
      namespace: cnpg
      kind: Service
      port: 80