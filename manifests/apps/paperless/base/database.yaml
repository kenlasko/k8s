---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: paperless
  namespace: cnpg
spec:
  name: paperless
  owner: paperless
  cluster:
    name: home

---
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: paperless
  namespace: cnpg
spec:
  cluster:
    name: home
  name: paperless
  login: true
  superuser: false
  createdb: true
  databaseRoleReclaimPolicy: retain
  passwordSecret:
    name: useraccount-paperless