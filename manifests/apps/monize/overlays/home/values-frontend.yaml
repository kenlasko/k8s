nameOverride: monize-frontend
image:
  registry: registry.laskonet.com
  repository: monize/frontend
  tag: latest
  # registry: ghcr.io
  # repository: wmp/monize-frontend
  # tag: fix-ai-confirm-card-deep-link-transaction-cfa7b11
  pullPolicy: Always
hostUsers: false
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 100
  seccompProfile:
    type: RuntimeDefault
  capabilities:
    drop: ["ALL"]
envFrom:
- configMapRef:
    name: env-vars-frontend
resources:
  requests:
    cpu: 3m
    memory: 50Mi
  limits:
    memory: 120Mi
service:
  port: 3000
livenessProbe:
  httpGet:
    path: /api/v1/health/live
    port: http
  initialDelaySeconds: 5
  periodSeconds: 60
  timeoutSeconds: 5
readinessProbe:
  httpGet:
    path: /api/v1/health/ready
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 3