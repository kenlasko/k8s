apiVersion: v1
kind: Namespace
metadata:
  name: syslog-downloader
---
apiVersion: v1
kind: Secret
metadata:
  name: syslog-downloader
  namespace: syslog-downloader
type: Opaque
stringData:
  COOKIE_SECRET: "X+9vpsrAgJyKc6OIQoNFrEO7b4hYcjsr7n/DAj9y8I9XR7mlPWXICZ/RlawqZHTM"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syslog-downloader
  namespace: syslog-downloader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syslog-downloader
  template:
    metadata:
      labels:
        app: syslog-downloader
    spec:
      automountServiceAccountToken: false
      hostUsers: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: registry.laskonet.com/syslog-downloader:latest  # registry.laskonet.com/syslog-downloader:latest  # quay.io/nectar-corp/syslog-downloader:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: STORAGE_DIR
              value: /var/lib/syslog-downloader
            - name: DXP_ENVIRONMENTS
              value: "us.nectar.services,demo.us.nectar.services"
            - name: SESSION_TTL
              value: "30m"
            - name: REQUEST_TIMEOUT
              value: "30s"
            - name: MAX_RESULTS
              value: "500000"
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: syslog-downloader
                  key: COOKIE_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/syslog-downloader
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: syslog-downloader
  namespace: syslog-downloader
spec:
  selector:
    app: syslog-downloader
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: syslog-downloader
  namespace: syslog-downloader
spec:
  podSelector:
    matchLabels:
      app: syslog-downloader
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 8080
          protocol: TCP
  egress:
    # DNS resolution.
    - to:
        - namespaceSelector: {}
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # HTTPS egress to upstream DXP. Restrict by CIDR or use a service mesh
    # (Cilium/Istio) to enforce FQDN-level egress to *.nectar.services.
    - ports:
        - port: 443
          protocol: TCP
