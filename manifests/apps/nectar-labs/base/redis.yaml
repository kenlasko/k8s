apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: nectar-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: redis
          image: redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
          ports:
            - containerPort: 6379
              name: redis
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket: { port: redis }
            periodSeconds: 15
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "192Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: nectar-labs
spec:
  selector:
    app: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
