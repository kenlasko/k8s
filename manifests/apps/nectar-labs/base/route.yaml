---
# OpenShift Route: external entrypoint. The single host fronts both the
# auth and shell containers; path-based routing keeps them on the same
# cookie domain so the signed session cookie is shared.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nectar-labs-shell
  namespace: nectar-labs
spec:
  host: labs.nectar.services
  path: /
  to:
    kind: Service
    name: nectar-labs-shell
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: nectar-labs-auth
  namespace: nectar-labs
  annotations:
    # Strip the /auth prefix before forwarding so the auth container can
    # keep its routes mounted at /login, /logout, /tenant, /static.
    haproxy.router.openshift.io/rewrite-target: /
spec:
  host: labs.nectar.services
  path: /auth
  to:
    kind: Service
    name: nectar-labs-auth
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
