apiVersion: apps/v1
kind: Deployment
metadata:
  name: nectar-labs-auth
  namespace: nectar-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nectar-labs-auth
  template:
    metadata:
      labels:
        app: nectar-labs-auth
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: registry.laskonet.com/nectar-labs-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DXP_ENVIRONMENTS
              value: "us.nectar.services,demo.us.nectar.services"
            - name: SESSION_TTL
              value: "30m"
            - name: REQUEST_TIMEOUT
              value: "30s"
            - name: REDIS_ADDR
              value: "redis.nectar-labs.svc.cluster.local:6379"
            - name: SHELL_URL
              value: "/shell/"
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: nectar-labs
                  key: COOKIE_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nectar-labs-auth
  namespace: nectar-labs
spec:
  selector:
    app: nectar-labs-auth
  ports:
    - name: http
      port: 8080
      targetPort: http
