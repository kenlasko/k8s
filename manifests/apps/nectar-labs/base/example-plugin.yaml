apiVersion: apps/v1
kind: Deployment
metadata:
  name: nectar-labs-example-plugin
  namespace: nectar-labs
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nectar-labs-example-plugin
  template:
    metadata:
      labels:
        app: nectar-labs-example-plugin
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: quay.io/nectar-corp/nectar-labs-example-plugin:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: PLUGIN_NAME
              value: "example"
            - name: PLUGIN_DISPLAY_NAME
              value: "Example"
            # COOKIE_SECRET is shared so plugin can verify shell-signed
            # session cookies if it ever wants to call the shell back.
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: nectar-labs
                  key: COOKIE_SECRET
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 15
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: nectar-labs-example-plugin
  namespace: nectar-labs
  annotations:
    nectar.labs/plugin: "true"
    nectar.labs/tab-name: "Example"
    nectar.labs/tab-order: "20"
spec:
  selector:
    app: nectar-labs-example-plugin
  ports:
    - name: http
      port: 8080
      targetPort: http
