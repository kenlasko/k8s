---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: sonarr
  namespace: cnpg
spec:
  name: sonarr
  owner: sonarr
  cluster:
    name: home

---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: sonarr-logs
  namespace: cnpg
spec:
  name: sonarr-logs
  owner: sonarr
  cluster:
    name: home

---
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: sonarr
  namespace: cnpg
spec:
  cluster:
    name: home
  name: sonarr
  login: true
  superuser: false
  createdb: true
  databaseRoleReclaimPolicy: retain
  passwordSecret:
    name: useraccount-sonarr