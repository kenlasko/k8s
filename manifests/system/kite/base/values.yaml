anonymousUserEnabled: false
debug: false
db:
  type: postgres
secret:
  create: false
  existingSecret: kite-secrets
extraEnvs:
- name: "HOST"
  value: "https://kite.laskonet.com"
- name: "NODE_TERMINAL_IMAGE"
  value: "nicolaka/netshoot"
- name: "PROMETHEUS_URL"
  value: "http://promstack-prometheus.monitoring.svc.cluster.local:9090"
config:
  enabled: true
  # clusters:
  # - name: Home
  #   inCluster: true
  #   default: true
  #   prometheusURL: "${PROMETHEUS_URL}"
  # - name: Cloud
  #   config: "${KITE_KUBECONFIG_CLOUD}"
  #   prometheusURL: "${PROMETHEUS_URL}"
  oauth:
  - name: pocket-id
    clientId: "${KITE_OAUTH_CLIENT_ID}"
    clientSecret: "${KITE_OAUTH_CLIENT_SECRET}"
    issuer: "https://auth.laskonet.com/.well-known/openid-configuration"
    scopes: "openid,profile,email,groups"
    authUrl: "https://auth.laskonet.com/authorize"
    tokenUrl: "https://auth.laskonet.com/api/oidc/token"
    userInfoUrl: "https://auth.laskonet.com/api/oidc/userinfo"
    enabled: true   