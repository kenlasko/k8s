---
apiVersion: postgresql.cnpg.io/v1
kind: Database
metadata:
  name: kite
  namespace: cnpg
spec:
  name: kite
  owner: kite
  cluster:
    name: home

---
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: kite
  namespace: cnpg
spec:
  cluster:
    name: home
  name: kite
  login: true
  superuser: false
  createdb: true
  databaseRoleReclaimPolicy: retain
  passwordSecret:
    name: useraccount-kite