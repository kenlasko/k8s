---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: http-redirect
  namespace: cilium
  annotations:
    external-dns.alpha.kubernetes.io/exclude: "true"
spec:
  parentRefs:
  - name: tls
    group: gateway.networking.k8s.io	
    kind: Gateway
    sectionName: http
  hostnames:
  - "*.laskonet.com"
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: 301
    matches:	
    - path:	
        type: PathPrefix	
        value: /