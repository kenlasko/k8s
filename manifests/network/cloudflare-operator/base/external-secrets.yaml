---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-operator-secret
  namespace: cloudflare
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    # Secret name must match spec.cloudflare.secret in the ClusterTunnel.
    name: cloudflare-operator-secret
  data:
    # Key name must match the operator's expected CLOUDFLARE_API_TOKEN key.
  - secretKey: CLOUDFLARE_API_TOKEN
    remoteRef:
      key: /cloudflare/operator-api-token