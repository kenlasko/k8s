---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: immich-secrets
  namespace: media
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: immich-secrets
    template:
      engineVersion: v2
      data:
        DB_DATABASE_NAME: "{{ .dbName }}"
        DB_HOSTNAME: "home-rw.cnpg.svc.cluster.local"
        DB_PASSWORD: "{{ .dbPassword }}"
        DB_USERNAME: "{{ .dbName }}"
        REDIS_HOSTNAME: "redis-service.redis.svc.cluster.local"
        REDIS_PASSWORD: "{{ .redisPassword }}"
  data:
  - secretKey: dbName
    remoteRef:
      key: /database/immich
      property: username
  - secretKey: dbPassword
    remoteRef:
      key: /database/immich
      property: password
  - secretKey: redisPassword
    remoteRef:
      key: /redis
      property: password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: useraccount-immich
  namespace: cnpg
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: useraccount-immich
    template:
      type: kubernetes.io/basic-auth
  dataFrom:
  - extract:
      key: /database/immich
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None
