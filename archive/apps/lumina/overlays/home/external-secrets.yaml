---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: env-secrets
  namespace: lumina
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: env-secrets
  data:
  - secretKey: DB_USER
    remoteRef:
      key: /database/lumina
      property: username
  - secretKey: DB_PASSWORD
    remoteRef:
      key: /database/lumina
      property: password

---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: useraccount-lumina
  namespace: cnpg
  labels:
    cnpg.io/reload: "true"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: akeyless
    kind: ClusterSecretStore
  target:
    name: useraccount-lumina
    template:
      type: kubernetes.io/basic-auth
  dataFrom:
  - extract:
      key: /database/lumina
      conversionStrategy: Default
      decodingStrategy: None
      metadataPolicy: None